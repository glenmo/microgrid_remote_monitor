<VirtualHost *:80>
    ServerName monitor.mooramoora.org.au

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName monitor.mooramoora.org.au

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/monitor.mooramoora.org.au/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/monitor.mooramoora.org.au/privkey.pem

    # Reverse proxy to Flask app on port 8100
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8100/
    ProxyPassReverse / http://127.0.0.1:8100/

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/monitor.mooramoora.org.au-error.log
    CustomLog ${APACHE_LOG_DIR}/monitor.mooramoora.org.au-access.log combined
</VirtualHost>
